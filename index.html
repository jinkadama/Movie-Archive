<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Archive</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #111; color: white; padding: 20px; }
    .hidden { display: none !important; }
    button, input, select { padding: 10px 12px; border: none; border-radius: 8px; font-size: 14px; background: #1d1d1d; color: white; border: 1px solid #333; }
    button { background: #e50914; cursor: pointer; border: none; transition: 0.2s; color: white; font-weight: bold; }
    button:hover { opacity: 0.8; }

    #guestWarning {
      background: #f1c40f; color: #000; padding: 10px; text-align: center;
      font-size: 13px; font-weight: bold; border-radius: 8px; margin-bottom: 20px;
      display: flex; justify-content: center; align-items: center; gap: 15px;
    }
    #guestWarning button { background: #000; color: #fff; padding: 5px 10px; font-size: 11px; width: auto; }

    .main-nav { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1100px; margin: 0 auto 20px; padding: 10px; }
    .nav-logo { font-weight: bold; font-size: 1.2rem; }
    .nav-logo span { color: #e50914; }

    .hero-banner { text-align: center; padding: 60px 0; display: flex; flex-direction: column; align-items: center; }
    .hero-search { display: flex; gap: 10px; width: 100%; max-width: 500px; }
    .hero-search input { flex: 1; }
    .cycling-text-container { height: 80px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
    #heroTitle { font-size: 2.8rem; margin: 0; font-weight: 800; transition: all 0.6s; color: white; }
    #heroTitle.highlight { color: #e50914; }
    .fade-out { opacity: 0; transform: scale(0.9) translateY(-10px); filter: blur(10px); }

    .library-layout { display: flex; gap: 30px; align-items: flex-start; }
    .sidebar { width: 240px; flex-shrink: 0; position: sticky; top: 20px; }
    .sidebar h3 { font-size: 0.8rem; color: #666; text-transform: uppercase; margin-bottom: 15px; }
    #folderBar { display: flex; flex-direction: column; gap: 8px; }
    .folder-row { display: flex; gap: 5px; align-items: center; }
    .folder-btn { text-align: left; background: #1c1c1c; color: #aaa; flex: 1; display: flex; justify-content: space-between; border: 1px solid #333; }
    .folder-btn.active { background: #e50914; color: white; font-weight: bold; border-color: #e50914; }
    .count-pill { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 10px; font-size: 10px; }
    .del-folder { background: #333; color: #777; width: 35px; border: 1px solid #444; }

    #movieList, .import-results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; width: 100%; }
    .movie, .rec-card { background: #1c1c1c; border-radius: 12px; overflow: hidden; border: 1px solid #333; display: flex; flex-direction: column; }
    .poster-wrap { width: 100%; height: 280px; position: relative; overflow: hidden; background: #222; cursor: pointer; }
    .poster-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .watched-badge { position: absolute; top: 10px; left: 10px; background: #2ecc71; color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
    .user-rating-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #f1c40f; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .favorite-badge { position: absolute; top: 10px; right: 10px; font-size: 18px; }

    .movie-content { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .movie-title { font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .move-select { font-size: 11px; background: #111; color: #888; padding: 5px; border-radius: 4px; }
    .movie-actions { margin-top: auto; display: grid; gap: 6px; }
    .action-row { display: grid; grid-template-columns: 2fr 1fr; gap: 6px; }

    .secondary-btn { background: #333; width: 100%; color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; }
    .secondary-btn.active { background: #e50914; }

    .heart-btn { font-size: 18px; background: #222; border: 1px solid #333; transition: transform 0.2s; }
    .heart-btn:hover { transform: scale(1.1); }
    .heart-btn.active { color: #ff4757; border-color: #ff4757; background: rgba(255, 71, 87, 0.1); }

    #trendingList { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; width: 100%; scroll-behavior: smooth; }
    #trendingList::-webkit-scrollbar { height: 6px; }
    #trendingList::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    .trending-card { min-width: 160px; flex: 0 0 auto; cursor: pointer; transition: 0.3s; }
    .trending-card:hover { transform: scale(1.05); }

    #movieOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .overlay-content { background: #1c1c1c; padding: 25px; border-radius: 15px; max-width: 600px; width: 100%; position: relative; border: 1px solid #444; }
    .overlay-close { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; }
    .star-container { display: flex; gap: 5px; margin: 15px 0; font-size: 32px; cursor: pointer; }
    .star { position: relative; width: 30px; height: 32px; color: #333; }
    .star::before { content: '★'; position: absolute; left: 0; }
    .star.full { color: #f1c40f; }
    .star.half::after { content: '★'; position: absolute; left: 0; width: 50%; overflow: hidden; color: #f1c40f; }

    .auth-shell { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: #1b1b1b; padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
    .divider { margin: 20px 0; border-top: 1px solid #333; position: relative; }
    .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #1b1b1b; padding: 0 10px; font-size: 12px; color: #666; }
    .guest-btn { background: #333; width: 100%; margin-top: 10px; border: 1px solid #444; color: white; }
  </style>
</head>
<body>

  <div id="movieOverlay" class="hidden" onclick="this.classList.add('hidden')">
    <div class="overlay-content" onclick="event.stopPropagation()">
      <span class="overlay-close" onclick="document.getElementById('movieOverlay').classList.add('hidden')">&times;</span>
      <div id="overlayData"></div>
    </div>
  </div>

  <div id="authScreen" class="auth-shell">
    <div class="auth-card">
      <h1>🎬 Movie Archive</h1>
      <div id="authForm" style="display:grid; gap:10px; margin-top:20px;">
        <input id="authEmail" type="email" placeholder="Email" />
        <input id="authPassword" type="password" placeholder="Password" />
        <button id="authActionBtn">Create Account</button>
      </div>
      <div class="divider"><span>OR</span></div>
      <button id="authGuestBtn" class="guest-btn">Continue as Guest</button>
      <div style="margin-top:15px; font-size:14px;">
        <span id="authSwitchText">Already have an account?</span>
        <a id="authSwitchLink" style="color:white; cursor:pointer; text-decoration:underline;">Log in</a>
      </div>
    </div>
  </div>

  <div id="appScreen" class="hidden">
    <div id="guestWarning" class="hidden">
      ⚠️ Guest Mode: Your data is temporary. <button onclick="auth.signOut()">Sign Up Now</button>
    </div>
    <nav class="main-nav">
      <div class="nav-logo">MOVIE<span>ARCHIVE</span></div>
      <div>
        <button onclick="showSection('home')">Home</button>
        <button onclick="showSection('library')">My Library</button>
      </div>
      <div>
        <span id="userEmailPill" style="margin-right:10px; font-size:13px; color:#aaa"></span>
        <button id="logoutBtn" style="background:#333; padding:5px 10px;">Logout</button>
      </div>
    </nav>

    <div id="homeSection" class="section">
      <div class="hero-banner">
        <div class="cycling-text-container"><h1 id="heroTitle" class="highlight">Movie Archive</h1></div>
        <div class="hero-search">
          <input id="unifiedSearchInput" type="text" placeholder="Search for movies..." />
          <button id="unifiedSearchBtn">Search</button>
        </div>
      </div>
      <div id="importResults" class="import-results-grid"></div>
      <div style="margin-top:40px; width:100%; max-width:1100px; margin-left:auto; margin-right:auto;">
        <h3 style="margin-bottom:15px; color:#666; text-transform:uppercase; font-size:0.8rem;">🔥 Trending This Week</h3>
        <div id="trendingList"></div>
      </div>
    </div>

    <div id="librarySection" class="section hidden" style="max-width:1100px; margin:0 auto;">
      <div class="library-layout">
        <aside class="sidebar">
          <h3>Folders</h3>
          <div id="folderBar"></div>
          <button id="createFolderBtn" style="background:#222; width:100%; margin-top:15px; border:1px dashed #444;">+ New Folder</button>
        </aside>
        <div class="library-main" style="flex:1;">
          <div style="background:#181818; padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid #222;">
            <h4 style="margin:0 0 10px 0; font-size:14px;">Quick Add to <span id="currentFolderLabel" style="color:#e50914;">All</span></h4>
            <div style="display:flex; gap:10px;">
              <input id="libQuickSearchInput" style="flex:1;" type="text" placeholder="Search to add instantly...">
              <button id="libQuickSearchBtn" style="background:#333;">Search</button>
            </div>
            <div id="libSearchResults" class="import-results-grid hidden" style="margin-top:15px; grid-template-columns:repeat(auto-fill, minmax(140px,1fr));"></div>
          </div>

          <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
            <input id="search" type="text" placeholder="Filter current folder..." style="flex: 1; min-width: 200px;">
            <select id="watchFilter">
              <option value="all">All Movies</option>
              <option value="watched">Watched</option>
              <option value="unwatched">Unwatched</option>
              <option value="favorites">❤️ Favorites</option>
            </select>
            <select id="genreFilter">
              <option value="All">All Genres</option>
              <option value="Action">Action</option>
              <option value="Animation">Animation</option>
              <option value="Comedy">Comedy</option>
              <option value="Drama">Drama</option>
              <option value="Horror">Horror</option>
              <option value="Romance">Romance</option>
              <option value="Sci-Fi">Sci-Fi</option>
              <option value="Thriller">Thriller</option>
            </select>
            <select id="sortSelect">
              <option value="newest">Newest First</option>
              <option value="titleAZ">A-Z</option>
            </select>
          </div>
          <div id="movieList"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInAnonymously, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, setDoc, writeBatch, getDocs, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBNeYDLxAG0ArCBwkoEVwX6M3bV1WI7XyI",
      authDomain: "movie-archive-c2b84.firebaseapp.com",
      projectId: "movie-archive-c2b84",
      storageBucket: "movie-archive-c2b84.firebasestorage.app",
      messagingSenderId: "854573353090",
      appId: "1:854573353090:web:73a9fe01fb969188848c9b"
    };

    const omdbApiKey = "bcb0b2b2", tmdbApiKey = "5ec3f7696f7a3607355f731b9171722e";
    const app = initializeApp(firebaseConfig), auth = getAuth(app), db = getFirestore(app);
    let currentUser = null, movies = [], userFolders = ["All"], currentFolder = "All", authMode = "signup";

    const moviesRef = () => collection(db, "users", currentUser.uid, "movies");
    const movieDoc = (id) => doc(db, "users", currentUser.uid, "movies", id);
    const foldersRef = () => collection(db, "users", currentUser.uid, "folders");

    const phrases = ["Movie Archive", "Curate Your Collection.", "What's Next?", "Track Every Story.", "Rate the Classics."];
    let phraseIdx = 0;
    setInterval(() => {
      const el = document.getElementById('heroTitle');
      if (!el) return;
      el.classList.add('fade-out');
      setTimeout(() => {
        phraseIdx = (phraseIdx + 1) % phrases.length;
        el.textContent = phrases[phraseIdx];
        el.classList.toggle('highlight', phrases[phraseIdx] === "Movie Archive");
        el.classList.remove('fade-out');
      }, 600);
    }, 4500);

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        document.getElementById("authScreen").classList.add("hidden");
        document.getElementById("appScreen").classList.remove("hidden");
        document.getElementById("userEmailPill").textContent = user.isAnonymous ? "Guest Mode" : user.email;
        document.getElementById("guestWarning").classList.toggle("hidden", !user.isAnonymous);
        startFolderListener();
        onSnapshot(query(moviesRef(), orderBy("createdAt", "desc")), (snap) => {
          movies = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderMovies();
        });
      } else {
        document.getElementById("authScreen").classList.remove("hidden");
        document.getElementById("appScreen").classList.add("hidden");
      }
    });

    document.getElementById('authActionBtn').onclick = async () => {
      const e = document.getElementById('authEmail').value, p = document.getElementById('authPassword').value;
      try { authMode === "signup" ? await createUserWithEmailAndPassword(auth, e, p) : await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert(err.message); }
    };
    document.getElementById('authGuestBtn').onclick = () => signInAnonymously(auth);
    document.getElementById('authSwitchLink').onclick = () => {
      authMode = authMode === "signup" ? "login" : "signup";
      document.getElementById('authActionBtn').textContent = authMode === "signup" ? "Create Account" : "Log In";
      document.getElementById('authSwitchText').textContent = authMode === "signup" ? "Already have an account?" : "Need an account?";
    };
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    window.showSection = (n) => {
      document.getElementById('homeSection').classList.toggle('hidden', n !== 'home');
      document.getElementById('librarySection').classList.toggle('hidden', n !== 'library');
      if(n === 'home') loadTrendingMovies();
      else renderMovies();
    };

    function startFolderListener() {
      onSnapshot(foldersRef(), (snap) => {
        userFolders = ["All", ...snap.docs.map(d => d.data().name)];
        updateFolderUI();
      });
    }

    function updateFolderUI() {
      const bar = document.getElementById('folderBar');
      if(!bar) return;
      document.getElementById('currentFolderLabel').innerText = currentFolder;
      bar.innerHTML = userFolders.map(f => {
        const count = f === "All" ? movies.length : movies.filter(m => m.folder === f).length;
        return `<div class="folder-row">
          <button onclick="setFolder('${f}')" class="folder-btn ${currentFolder === f ? 'active' : ''}">
            <span>📁 ${f}</span><span class="count-pill">${count}</span>
          </button>
          ${f !== 'All' ? `<button class="del-folder" onclick="deleteFolder('${f}')">×</button>` : ''}
        </div>`}).join('');
    }

    window.setFolder = (n) => { currentFolder = n; updateFolderUI(); renderMovies(); };
    window.deleteFolder = async (n) => {
      if(!confirm(`Delete folder and movies?`)) return;
      await deleteDoc(doc(db, "users", currentUser.uid, "folders", n));
      const snap = await getDocs(query(moviesRef(), where("folder", "==", n)));
      const batch = writeBatch(db);
      snap.forEach(d => batch.delete(d.ref));
      await batch.commit();
      if(currentFolder === n) setFolder("All");
    };

    window.moveMovie = async (id, folder) => await updateDoc(movieDoc(id), { folder });

    window.setRating = async (id, e, idx) => {
      const rect = e.target.getBoundingClientRect();
      const rating = (e.clientX - rect.left) < (rect.width/2) ? idx+0.5 : idx+1;
      await updateDoc(movieDoc(id), { userRating: rating });
      showDetails(null, null, id);
    };

    window.showDetails = async (title, imdbID, existingId) => {
      const overlay = document.getElementById('movieOverlay');
      overlay.classList.remove('hidden');
      const queryParam = imdbID ? `i=${imdbID}` : (existingId ? `t=${encodeURIComponent(movies.find(m=>m.id===existingId).title)}` : `t=${encodeURIComponent(title)}`);
      const res = await fetch(`https://www.omdbapi.com/?${queryParam}&apikey=${omdbApiKey}&plot=full`);
      const data = await res.json();
      const libM = existingId ? movies.find(m=>m.id===existingId) : movies.find(m=>m.title===data.Title);
      const rating = libM?.userRating || 0;

      document.getElementById('overlayData').innerHTML = `
        <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">
          <img src="${data.Poster}" style="width:180px; border-radius:10px;">
          <div style="flex:1; min-width:250px;">
            <h2 style="margin:0">${data.Title}</h2>
            <p style="color:#e50914; font-weight:bold; margin:10px 0;">⭐ OMDB: ${data.imdbRating} | ${data.Year}</p>
            ${libM ? `<div class="star-container">${[0,1,2,3,4].map(i => `<div class="star ${rating>=i+1?'full':(rating>=i+0.5?'half':'')}" onclick="setRating('${libM.id}',event,${i})"></div>`).join('')}</div>` : ''}
            <p style="font-size:14px; color:#ccc;">${data.Plot}</p>
            ${libM ? `<button disabled style="width:100%; background:#222;">✓ In Library</button>` : `<button onclick="importMovie('${data.imdbID}')" style="width:100%;">+ Add to Archive</button>`}
          </div>
        </div>`;
    };

    window.importMovie = async (id) => {
      const res = await fetch(`https://www.omdbapi.com/?i=${id}&apikey=${omdbApiKey}`);
      const d = await res.json();
      await addDoc(moviesRef(), {
        title: d.Title, poster: d.Poster, genre: d.Genre, createdAt: Date.now(),
        watched: false, favorite: false, userRating: 0,
        folder: currentFolder==="All"?"Archive":currentFolder
      });
      document.getElementById('movieOverlay').classList.add('hidden');
      document.getElementById('libSearchResults').classList.add('hidden');
    };

    window.toggleWatched = (id, v) => updateDoc(movieDoc(id), { watched: !v });
    window.toggleFavorite = (id, v) => updateDoc(movieDoc(id), { favorite: !v });
    window.deleteMovie = (id) => confirm("Delete?") && deleteDoc(movieDoc(id));

    function renderMovies() {
      const list = document.getElementById("movieList");
      if(!list) return;

      const searchVal = document.getElementById('search').value.toLowerCase();
      const genreVal = document.getElementById('genreFilter').value;
      const watchStatus = document.getElementById('watchFilter').value;
      const sortVal = document.getElementById('sortSelect').value;

      let filtered = movies.filter(m => {
        const matchesSearch = m.title.toLowerCase().includes(searchVal);
        const matchesGenre = (genreVal === "All" || (m.genre && m.genre.includes(genreVal)));
        const matchesFolder = (currentFolder === "All" || m.folder === currentFolder);
        let matchesStatus = true;
        if (watchStatus === "watched") matchesStatus = m.watched === true;
        if (watchStatus === "unwatched") matchesStatus = m.watched === false;
        if (watchStatus === "favorites") matchesStatus = m.favorite === true;
        return matchesSearch && matchesGenre && matchesFolder && matchesStatus;
      });

      if(sortVal === "titleAZ") filtered.sort((a,b) => a.title.localeCompare(b.title));
      else filtered.sort((a,b) => b.createdAt - a.createdAt);

      list.innerHTML = filtered.map(m => `
        <div class="movie">
          <div class="poster-wrap" onclick="showDetails(null, null, '${m.id}')">
            <img src="${m.poster}">
            ${m.watched?'<div class="watched-badge">✓</div>':''}
            ${m.userRating>0?`<div class="user-rating-badge">★ ${m.userRating}</div>`:''}
            ${m.favorite?'<div class="favorite-badge">❤️</div>':''}
          </div>
          <div class="movie-content">
            <div class="movie-title">${m.title}</div>
            <select class="move-select" onchange="moveMovie('${m.id}', this.value)">
              ${userFolders.filter(f => f !== 'All').map(f => `<option value="${f}" ${m.folder === f ? 'selected' : ''}>Move to: ${f}</option>`).join('')}
            </select>
            <div class="movie-actions">
              <div class="action-row">
                <button class="secondary-btn ${m.watched?'active':''}" onclick="toggleWatched('${m.id}',${m.watched})">
                  ${m.watched ? 'Watched' : 'Watch'}
                </button>
                <button class="secondary-btn heart-btn ${m.favorite?'active':''}" onclick="toggleFavorite('${m.id}',${m.favorite})">
                  ${m.favorite ? '❤️' : '♡'}
                </button>
              </div>
              <button style="background:#222; font-size:11px;" onclick="deleteMovie('${m.id}')">Delete</button>
            </div>
          </div>
        </div>`).join('');
      updateFolderUI();
    }

    document.getElementById('unifiedSearchBtn').onclick = async () => {
      const q = document.getElementById('unifiedSearchInput').value;
      const res = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(q)}&apikey=${omdbApiKey}`);
      const data = await res.json();
      if(data.Search) document.getElementById('importResults').innerHTML = data.Search.map(m => `<div class="rec-card" onclick="showDetails('', '${m.imdbID}')"><div class="poster-wrap"><img src="${m.Poster}"></div><div class="movie-content"><div class="movie-title">${m.Title}</div><button style="width:100%; font-size:11px;">View & Add</button></div></div>`).join('');
    };

    async function loadTrendingMovies() {
      const res = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${tmdbApiKey}`);
      const data = await res.json();
      document.getElementById('trendingList').innerHTML = data.results.slice(0,10).map(m => `<div class="trending-card" onclick="showDetails('${m.title.replace(/'/g,"")}')"><img src="https://image.tmdb.org/t/p/w500${m.poster_path}" width="160" style="border-radius:8px;"></div>`).join('');
    }

    document.getElementById('createFolderBtn').onclick = async () => {
      const n = prompt("Folder Name:");
      if(n?.trim()) await setDoc(doc(db, "users", currentUser.uid, "folders", n.trim()), { name: n.trim() });
    };

    document.getElementById('libQuickSearchBtn').onclick = async () => {
      const q = document.getElementById('libQuickSearchInput').value;
      const res = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(q)}&apikey=${omdbApiKey}`);
      const data = await res.json();
      if(data.Search) {
        document.getElementById('libSearchResults').classList.remove('hidden');
        document.getElementById('libSearchResults').innerHTML = data.Search.slice(0,4).map(m => `<div class="movie" style="cursor:pointer; background:#222" onclick="importMovie('${m.imdbID}')"><img src="${m.Poster}" height="100" style="width:100%; object-fit:cover;"><p style="font-size:9px; margin:5px; text-align:center;">${m.Title}</p></div>`).join('');
      }
    };

    document.getElementById('search').oninput = renderMovies;
    document.getElementById('watchFilter').onchange = renderMovies;
