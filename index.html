<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Archive</title>
  <style>
    /* --- CORE STYLES --- */
    * { box-sizing: border-box; }
    body {
        margin: 0; font-family: 'Segoe UI', Arial, sans-serif;
        background: #0a0a0a; color: white; padding: 20px;
        min-height: 100vh; display: flex; flex-direction: column;
        overflow-x: hidden; position: relative;
    }

    #toastContainer {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
}

.toast {
  background: rgba(20, 20, 20, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 13px;
  min-width: 200px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
  opacity: 0;
  transform: translateY(20px);
  animation: toastIn 0.3s ease forwards;
}

.toast.success { border-left: 4px solid #2ecc71; }
.toast.error { border-left: 4px solid #e74c3c; }
.toast.info { border-left: 4px solid #3498db; }

@keyframes toastIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes toastOut {
  to {
    opacity: 0;
    transform: translateY(20px);
  }
}

    /* Background Glows */
    body::before, body::after {
        content: ""; position: fixed; width: 50vw; height: 50vw;
        border-radius: 50%; z-index: -1; filter: blur(120px);
        opacity: 0.12; pointer-events: none;
    }
    body::before { top: -10%; left: -10%; background: #e50914; }
    body::after { bottom: -10%; right: -10%; background: #007bff; }

    .hidden { display: none !important; }
#bgCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2; /* behind glows (-1) and content (0+) */
}

    /* --- Moving Background Animation --- */
@keyframes floatBackground {
  0% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(40px, -30px) rotate(45deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}

body::before {
    animation: floatBackground 25s infinite ease-in-out alternate;
}

body::after {
    animation: floatBackground 30s infinite ease-in-out alternate-reverse;
}


    /* --- GLASS MORPHISM GLOBALS --- */
    button, input, select {
        padding: 10px 12px; border-radius: 8px; font-size: 14px;
        background: rgba(255, 255, 255, 0.05); color: white;
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px); outline: none;
    }
    button {
        background: #e50914; cursor: pointer; border: none;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        color: white; font-weight: bold;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4); }


select {
    background-color: #1a1a1a;
    color: white;
    cursor: pointer;
}


select option {
    background-color: #222;
    color: white;
    padding: 10px;
}


select option:hover {
    background-color: #e50914;
}

    /* --- GUEST WARNING --- */
    #guestWarning { background: #f1c40f; color: #000; padding: 10px; text-align: center; font-size: 13px; font-weight: bold; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 1001; }
    #guestWarning button { background: #000; color: #fff; padding: 5px 10px; font-size: 11px; width: auto; }

    /* --- NAVIGATION (Frosted) --- */
    .main-nav {
        display: flex; justify-content: space-between; align-items: center;
        width: 100%; max-width: 1100px; margin: 0 auto 20px; padding: 15px 20px;
        background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px; position: sticky; top: 10px; z-index: 1000;
    }
    .nav-logo { font-weight: bold; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; }
    .nav-logo span { color: #e50914; }
    .nav-center { display: flex; align-items: center; gap: 10px; }
    .burger-toggle { display: flex; flex-direction: column; gap: 4px; cursor: pointer; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
    .burger-toggle div { width: 18px; height: 2px; background: white; border-radius: 2px; }

    /* --- HOME SCREEN --- */
    #homeSection { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: 40px; }
    .hero-banner { text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
    .hero-search { display: flex; width: 100%; max-width: 600px; margin: 20px auto 0; }
    .hero-search input { flex: 1; border-radius: 12px 0 0 12px; height: 52px; background: rgba(255, 255, 255, 0.08); border-right: none; }
    .hero-search button { border-radius: 0 12px 12px 0; height: 52px; padding: 0 30px; }

    .cycling-text-container { height: 60px; display: flex; align-items: center; justify-content: center; }
    #heroTitle { font-size: 3.2rem; margin: 0; font-weight: 800; transition: all 0.6s; }
    #heroTitle.highlight { color: #e50914; text-shadow: 0 0 20px rgba(229, 9, 20, 0.2); }
    .fade-out { opacity: 0; transform: scale(0.9) translateY(-10px); filter: blur(10px); }

    /* --- MOVIE CARDS (Glassy) --- */
    #movieList, .import-results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 20px; width: 100%; }
    .movie, .rec-card {
        background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
        border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex; flex-direction: column; transition: 0.3s;
    }
    .movie:hover { transform: translateY(-8px); border-color: rgba(229, 9, 20, 0.5); }
    .poster-wrap { width: 100%; height: 280px; position: relative; overflow: hidden; background: #222; cursor: pointer; }
    .poster-wrap img { width: 100%; height: 100%; object-fit: cover; }

    .watched-badge { position: absolute; top: 10px; left: 10px; background: #2ecc71; color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; z-index: 2; }
    .user-rating-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.85); color: #f1c40f; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; border: 1px solid #f1c40f; }
    .favorite-badge { position: absolute; top: 10px; right: 10px; font-size: 18px; text-shadow: 0 0 5px rgba(0,0,0,0.5); z-index: 2; }

    .movie-content { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .movie-title { font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .secondary-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.05); color: white; }
    .secondary-btn.active { background: #e50914; border: none; }

    /* --- SIDEBAR & LIBRARY --- */
    .library-layout { display: flex; gap: 0; align-items: flex-start; transition: gap 0.3s; }
    .sidebar { width: 0; opacity: 0; overflow: hidden; flex-shrink: 0; transition: width 0.3s ease, opacity 0.3s ease; }
    .sidebar.active {
        width: 240px; opacity: 1; margin-right: 30px;
        background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px);
        padding: 15px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.05);
    }
    #folderBar { display: flex; flex-direction: column; gap: 8px; }
    .folder-row { display: flex; gap: 5px; align-items: center; }
    .folder-btn { text-align: left; background: rgba(255,255,255,0.05); color: #aaa; flex: 1; display: flex; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1); }
    .folder-btn.active { background: #e50914; color: white; font-weight: bold; border-color: #e50914; }
    .count-pill { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 10px; font-size: 10px; }

    /* --- TRENDING LIST --- */
    #trendingList { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; width: 100%; scroll-behavior: smooth; }
    #trendingList::-webkit-scrollbar { height: 4px; }
    #trendingList::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    .trending-card { min-width: 160px; flex: 0 0 auto; cursor: pointer; transition: 0.3s; border-radius: 8px; overflow: hidden; }
    .trending-card:hover { transform: translateY(-5px); }
    .trending-card img { width: 160px; height: 240px; object-fit: cover; }

    /* --- OVERLAY & STARS --- */
    #movieOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .overlay-content { background: rgba(25, 25, 25, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 20px; max-width: 650px; width: 100%; position: relative; }
    .star-container { display: flex; gap: 5px; margin: 15px 0; font-size: 32px; cursor: pointer; }
    .star { position: relative; width: 30px; height: 32px; color: #333; }
    .star::before { content: '★'; position: absolute; left: 0; }
    .star.full { color: #f1c40f; }
    .star.half::after { content: '★'; position: absolute; left: 0; width: 50%; overflow: hidden; color: #f1c40f; }


    /* --- PROVIDER ICONS (FROM SCRIPT 2) --- */
.provider-row {
    display: flex; gap: 12px; margin: 15px 0;
    padding: 12px; background: rgba(255,255,255,0.03);
    border-radius: 12px; align-items: center; justify-content: center;
}
.provider-icon {
    width: 38px; height: 38px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 22px; cursor: pointer;
    transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
    user-select: none;
}
.icon-n { background: #000; color: #e50914; border-color: #e50914; }
.icon-p { background: #000; color: #00a8e1; border-color: #00a8e1; }
.icon-d { background: #000; color: #00af94; border-color: #00af94; }
.icon-h { background: #000; color: #ffffff; border-color: #ffffff; }

.provider-icon.available:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px currentColor;
}
.provider-icon.unavailable {
    filter: grayscale(1) opacity(0.1);
    cursor: not-allowed;
    pointer-events: none;
}

.provider-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
    border: 1px solid rgba(255,255,255,0.1);
}

.provider-icon:hover {
    transform: scale(1.15);
    box-shadow:
        0 0 10px rgba(255,255,255,0.3),
        0 0 20px rgba(229, 9, 20, 0.5);
}


    /* --- ENTRANCE ANIMATION --- */
    #loader-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: none; justify-content: center; align-items: center; z-index: 9999; }
    #loader-layer.active { display: flex; }
    .intro-wrapper { display: flex; font-size: 5rem; font-weight: 900; letter-spacing: -5px; position: relative; }
    .letter-m { color: white; transform: translateX(-200vw); }
    .letter-a { color: #e50914; transform: translateX(200vw); }
    .animate-m { animation: collideLeft 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    .animate-a { animation: collideRight 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    @keyframes collideLeft { 0% { transform: translateX(-200vw); } 70% { transform: translateX(20px); } 100% { transform: translateX(0); } }
    @keyframes collideRight { 0% { transform: translateX(200vw); } 70% { transform: translateX(-20px); } 100% { transform: translateX(0); } }
    .impact-flash { position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 100px 40px white; opacity: 0; pointer-events: none; }
    .flash-hit { animation: flashSnap 0.2s 0.6s ease-out; }
    @keyframes flashSnap { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(2); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(3); } }
    .fade-out-layer { animation: exitScreen 0.5s ease forwards; pointer-events: none; }
    @keyframes exitScreen { 0% { opacity: 1; } 100% { opacity: 0; } }

    /* --- AUTH --- */
    .auth-shell { flex: 1; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(20px); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); }

@media screen and (max-width: 600px) {

    .main-nav {
        flex-direction: column !important;
        height: auto !important;
        padding: 15px 10px !important;
        gap: 15px !important;
        align-items: center !important;
    }


    .nav-logo {
        width: 100% !important;
        justify-content: center !important;
        font-size: 1.3rem !important;
        margin-bottom: 5px !important;
        letter-spacing: -1px !important;
    }

    .merge-a {
        margin-left: -7px !important;

    }


    .nav-center {
        display: flex !important;
        flex-direction: row !important;
        width: 100% !important;
        justify-content: center !important;
        gap: 8px !important;
    }

    .nav-center button,
    .burger-toggle,
    #logoutBtn {
        flex: 1 !important;
        padding: 12px 5px !important;
        font-size: 11px !important;
        text-transform: uppercase !important;
        letter-spacing: 0.5px !important;
        white-space: nowrap !important;
        min-width: 0 !important;
        height: 45px !important;
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
    }


    #homeSection {
        padding-top: 20px !important;
    }

    #heroTitle {
        font-size: 2.2rem !important;
        text-align: center !important;
        line-height: 1.1 !important;
        margin-bottom: 20px !important;
    }

    .hero-search {
        flex-direction: column !important;
        width: 100% !important;
        gap: 10px !important;
    }

    .hero-search input {
        border-radius: 12px !important;
        width: 100% !important;
        height: 50px !important;
        border-right: 1px solid rgba(255, 255, 255, 0.1) !important;
        text-align: center !important;
    }

    .hero-search button {
        border-radius: 12px !important;
        width: 100% !important;
        height: 50px !important;
    }


    select {
        background-color: #1a1a1a !important;
        appearance: none !important;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e") !important;
        background-repeat: no-repeat !important;
        background-position: right 10px center !important;
        background-size: 20px !important;
    }

    select option {
        background-color: #1a1a1a !important;
        color: white !important;
    }
}
  </style>
</head>
<body>

  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
  });

  const glowCenters = [
      { x: width * 0.1, y: height * 0.1, color: [229, 9, 20] },
      { x: width * 0.9, y: height * 0.9, color: [0, 123, 255] }
  ];

  const particles = [];
  const particleCount = 150;

  for (let i = 0; i < particleCount; i++) {
      particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 1.5 + 0.5,
          brightness: Math.random(),
          dx: (Math.random() - 0.5) * 0.3,
          dy: (Math.random() - 0.5) * 0.3
      });
  }

  function animate() {
      ctx.clearRect(0, 0, width, height);

      particles.forEach(p => {
          p.x += p.dx;
          p.y += p.dy;

          if (p.x < 0) p.x = width;
          if (p.x > width) p.x = 0;
          if (p.y < 0) p.y = height;
          if (p.y > height) p.y = 0;

          p.brightness += (Math.random() - 0.5) * 0.05;
          p.brightness = Math.max(0, Math.min(1, p.brightness));

          let r = 255, g = 255, b = 255;
          glowCenters.forEach(glow => {
              const dx = p.x - glow.x;
              const dy = p.y - glow.y;
              const dist = Math.sqrt(dx*dx + dy*dy);
              const influence = Math.min(1, 300 / (dist + 1));
              r = r * (1 - influence) + glow.color[0] * influence;
              g = g * (1 - influence) + glow.color[1] * influence;
              b = b * (1 - influence) + glow.color[2] * influence;
          });

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)}, ${p.brightness})`;
          ctx.fill();
      });

      requestAnimationFrame(animate);
  }

  animate();

  // --- LOGO ANIMATION TRIGGER --- //
  window.triggerRefresh = () => {
    const loader = document.getElementById('loader-layer');
    loader.classList.add('active');
    loader.classList.remove('fade-out-layer');
    const m = document.getElementById('m-part');
    const a = document.getElementById('a-part');
    const flash = document.getElementById('flash-point');

    m.classList.remove('animate-m');
    a.classList.remove('animate-a');
    flash.classList.remove('flash-hit');

    setTimeout(() => {
      m.classList.add('animate-m');
      a.classList.add('animate-a');
      flash.classList.add('flash-hit');
      goHome();
      setTimeout(() => {
        loader.classList.add('fade-out-layer');
        setTimeout(() => loader.classList.remove('active'), 500);
      }, 1500);
    }, 10);
  };

  // --- Toast Notification --- //
  function showToast(message, type = "info") {
    const container = document.getElementById("toastContainer");

    const toast = document.createElement("div");
    toast.className = `toast ${type}`;
    toast.textContent = message;

    container.appendChild(toast);

    setTimeout(() => {
      toast.style.animation = "toastOut 0.3s ease forwards";
      setTimeout(() => toast.remove(), 300);
    }, 2500);
  }

  document.getElementById('unifiedSearchInput')
    .addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleSearch('unifiedSearchInput', 'importResults');
  });


  // --- NAVIGATION ---
  window.goHome = () => {
    showSection('home');
    document.getElementById('unifiedSearchInput').value = '';
    document.getElementById('importResults').innerHTML = '';
    currentFolder = "All";
    loadTrendingMovies();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  window.showSection = (n) => {
    document.getElementById('homeSection').classList.toggle('hidden', n !== 'home');
    document.getElementById('librarySection').classList.toggle('hidden', n !== 'library');
    document.getElementById('folderSidebar').classList.remove('active');
  };

  window.toggleSidebar = () => document.getElementById('folderSidebar').classList.toggle('active');

  // --- CYCLING TEXT ---
  const phrases = ["Movie Archive", "Curate Your Collection.", "What's Next?", "Track Every Story.",   "너랑 얘기할 수 있으면 좋겠다, 리카", "Rate the Classics."];
  let phraseIdx = 0;
  setInterval(() => {
    const el = document.getElementById('heroTitle');
    if (!el) return;
    el.classList.add('fade-out');
    setTimeout(() => {
      phraseIdx = (phraseIdx + 1) % phrases.length;
      el.textContent = phrases[phraseIdx];
      el.classList.toggle('highlight', phrases[phraseIdx] === "Movie Archive");
      el.classList.remove('fade-out');
    }, 600);
  }, 4500);

  // --- FIREBASE SYNC ---
  const moviesRef = () => collection(db, "users", currentUser.uid, "movies");
  const movieDoc = (id) => doc(db, "users", currentUser.uid, "movies", id);
  const foldersRef = () => collection(db, "users", currentUser.uid, "folders");

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      document.getElementById("authScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");
      document.getElementById("userEmailPill").textContent = user.isAnonymous ? "Guest Mode" : user.email;
      document.getElementById("guestWarning").classList.toggle("hidden", !user.isAnonymous);

      onSnapshot(foldersRef(), (snap) => {
        userFolders = ["All", ...snap.docs.map(d => d.data().name)];
        updateFolderUI();
      });

      onSnapshot(query(moviesRef(), orderBy("createdAt", "desc")), (snap) => {
        movies = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderMovies();
      });
      loadTrendingMovies();
    } else {
      document.getElementById("authScreen").classList.remove("hidden");
      document.getElementById("appScreen").classList.add("hidden");
    }
  });

  // --- RENDERING ---
  function renderMovies() {
    const list = document.getElementById("movieList");
    if(!list) return;
    const searchVal = document.getElementById('search').value.toLowerCase();
    const genreVal = document.getElementById('genreFilter').value;
    const watchStatus = document.getElementById('watchFilter').value;
    const sortVal = document.getElementById('sortSelect').value;

    let filtered = movies.filter(m => {
      const matchesSearch = m.title.toLowerCase().includes(searchVal);
      const matchesGenre = (genreVal === "All" || (m.genre && m.genre.includes(genreVal)));
      const matchesFolder = (currentFolder === "All" || m.folder === currentFolder);
      let matchesStatus = true;
      if (watchStatus === "watched") matchesStatus = m.watched;
      if (watchStatus === "unwatched") matchesStatus = !m.watched;
      if (watchStatus === "favorites") matchesStatus = m.favorite;
      return matchesSearch && matchesGenre && matchesFolder && matchesStatus;
    });

    if(sortVal === "titleAZ") filtered.sort((a,b) => a.title.localeCompare(b.title));

    list.innerHTML = filtered.map(m => `
      <div class="movie">
        <div class="poster-wrap" onclick="showDetails(null, null, '${m.id}')">
          <img src="${m.poster}">
          ${m.watched?'<div class="watched-badge">✓</div>':''}
          ${m.userRating>0?`<div class="user-rating-badge">★ ${m.userRating}</div>`:''}
          ${m.favorite?'<div class="favorite-badge">❤️</div>':''}
        </div>
        <div class="movie-content">
          <div class="movie-title">${m.title}</div>
          <select class="move-select" style="font-size:11px;" onchange="moveMovie('${m.id}', this.value)">
            <option value="" disabled selected>Move to...</option>
            ${userFolders.filter(f => f !== 'All').map(f => `<option value="${f}" ${m.folder === f ? 'selected' : ''}>${f}</option>`).join('')}
          </select>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:5px;">
            <button class="secondary-btn ${m.watched?'active':''}" onclick="toggleWatched('${m.id}',${m.watched})">${m.watched ? 'Watched' : 'Watch'}</button>
            <button class="secondary-btn ${m.favorite?'active':''}" onclick="toggleFavorite('${m.id}',${m.favorite})">❤️</button>
          </div>
          <button style="background:rgba(255,255,255,0.05); font-size:10px; margin-top:5px;" onclick="deleteMovie('${m.id}')">Delete</button>
        </div>
      </div>`).join('');
    updateFolderUI();
  }

  function updateFolderUI() {
    const bar = document.getElementById('folderBar');
    if(!bar) return;
    document.getElementById('currentFolderLabel').innerText = currentFolder;
    bar.innerHTML = userFolders.map(f => {
      const count = f === "All" ? movies.length : movies.filter(m => m.folder === f).length;
      return `<div class="folder-row">
        <button onclick="setFolder('${f}')" class="folder-btn ${currentFolder === f ? 'active' : ''}">
          <span>📁 ${f}</span><span class="count-pill">${count}</span>
        </button>
        ${f !== 'All' ? `<button style="background:#333; width:30px;" onclick="deleteFolder('${f}')">×</button>` : ''}
      </div>`}).join('');
  }

  window.setFolder = (n) => { currentFolder = n; updateFolderUI(); renderMovies(); };
  window.deleteFolder = async (n) => {
    if(!confirm(`Delete folder and movies?`)) return;
    await deleteDoc(doc(db, "users", currentUser.uid, "folders", n));
    const snap = await getDocs(query(moviesRef(), where("folder", "==", n)));
    const batch = writeBatch(db); snap.forEach(d => batch.delete(d.ref)); await batch.commit();
    if(currentFolder === n) setFolder("All");
  };


  async function getProviders(imdbID) {
  try {
    const f = await fetch(`https://api.themoviedb.org/3/find/${imdbID}?api_key=${tmdbApiKey}&external_source=imdb_id`);
    const fd = await f.json();
    const id = fd.movie_results[0]?.id;
    if (!id) return null;

    const r = await fetch(`https://api.themoviedb.org/3/movie/${id}/watch/providers?api_key=${tmdbApiKey}`);
    const d = await r.json();

    // PRIORITY: Philippines → fallback to US
    return d.results['PH'] || d.results['US'] || null;

  } catch(e) {
    return null;
  }
}

  // --- DETAILS & STARS ---
  window.showDetails = async (title, imdbID, existingId) => {
  const overlay = document.getElementById('movieOverlay');
  overlay.classList.remove('hidden');
  document.getElementById('overlayData').innerHTML = `<p style="text-align:center;">Fetching Details...</p>`;

  let queryParam;

if (imdbID && imdbID.startsWith('tt')) {
  queryParam = `i=${imdbID}`;
} else if (imdbID) {
  // TMDB ID → convert to IMDb
  const tmdbRes = await fetch(`https://api.themoviedb.org/3/movie/${imdbID}?api_key=${tmdbApiKey}`);
  const tmdbData = await tmdbRes.json();
  queryParam = `i=${tmdbData.imdb_id}`;
} else if (existingId) {
  queryParam = `t=${encodeURIComponent(movies.find(m=>m.id===existingId).title)}`;
} else {
  queryParam = `t=${encodeURIComponent(title)}`;
}

  const res = await fetch(`https://www.omdbapi.com/?${queryParam}&apikey=${omdbApiKey}&plot=full`);
  const data = await res.json();

  const prov = await getProviders(data.imdbID);
  const providers = prov?.flatrate || [];

  const libM = movies.find(m => m.imdbID === data.imdbID || m.title === data.Title);
  const rating = libM?.userRating || 0;

  const ratings = data.Ratings || [];
  const rt = ratings.find(r => r.Source === "Rotten Tomatoes")?.Value || "N/A";
  const mc = ratings.find(r => r.Source === "Metacritic")?.Value || "N/A";

  const providerHTML = providers.length > 0
    ? providers.slice(0,4).map(p => {
        const urlMap = {
          8: "https://www.netflix.com/search?q=",
          9: "https://www.amazon.com/s?k=",
          337: "https://www.disneyplus.com/search?q=",
          384: "https://www.max.com/search/"
        };

        const url = urlMap[p.provider_id]
          ? urlMap[p.provider_id] + encodeURIComponent(data.Title)
          : `https://www.google.com/search?q=${encodeURIComponent(data.Title + " " + p.provider_name)}`;

        return `
          <div class="provider-icon available"
               onclick="window.open('${url}','_blank')"
               title="${p.provider_name}">
            <img src="https://image.tmdb.org/t/p/w45${p.logo_path}"
                 style="width:70%; height:70%; object-fit:contain;">
          </div>`;
      }).join('')
    : `<div style="opacity:0.5;">No streaming data</div>`;

  document.getElementById('overlayData').innerHTML = `
    <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">
      <img src="${data.Poster}" style="width:180px; border-radius:10px;">
      <div style="flex:1; min-width:250px;">
        <h2 style="margin:0">${data.Title}</h2>

        <div class="provider-row">${providerHTML}</div>

        <p style="color:#e50914; font-weight:bold; margin:10px 0;">
          ⭐ IMDB: ${data.imdbRating} | RT: ${rt} | MC: ${mc}
        </p>

        ${libM ? `
        <div class="star-container">
          ${[0,1,2,3,4].map(i =>
            `<div class="star ${
              rating>=i+1 ? 'full' : (rating>=i+0.5 ? 'half':'')
            }" onclick="setRating('${libM.id}',event,${i})"></div>`
          ).join('')}
        </div>` : ''}

        <p style="font-size:14px; opacity:0.8;">${data.Plot}</p>

        ${libM
          ? `<button disabled style="width:100%; background:rgba(255,255,255,0.05);">✓ In Library</button>`
          : `<button onclick="importMovie('${data.imdbID}')" style="width:100%;">+ Add to Archive</button>`
        }
      </div>
    </div>`;
};


  window.setRating = async (id, e, idx) => {
    const rect = e.target.getBoundingClientRect();
    const rating = (e.clientX - rect.left) < (rect.width/2) ? idx+0.5 : idx+1;
    await updateDoc(movieDoc(id), { userRating: rating });
    showDetails(null, null, id);
  };

  // --- SEARCH & IMPORT ---
  let searchTimeout;

const handleSearch = (inputID, outputID) => {
  clearTimeout(searchTimeout);

  searchTimeout = setTimeout(async () => {
    const q = document.getElementById(inputID).value.trim();
    if (q.length < 3) return;

    const res = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(q)}&apikey=${omdbApiKey}`);
    const data = await res.json();

    if (!data.Search) return;

    const out = document.getElementById(outputID);
    out.classList.remove('hidden');

    out.innerHTML = data.Search.map(m => `
      <div class="rec-card" onclick="showDetails('', '${m.imdbID}')">
        <div class="poster-wrap">
          <img src="${m.Poster !== 'N/A' ? m.Poster : ''}">
        </div>
        <div class="movie-content">
          <div class="movie-title">${m.Title}</div>
          <button style="width:100%; font-size:11px;">View & Add</button>
        </div>
      </div>
    `).join('');
  }, 400);
};

  window.importMovie = async (id) => {
  const res = await fetch(`https://www.omdbapi.com/?i=${id}&apikey=${omdbApiKey}`);
  const d = await res.json();

  await addDoc(moviesRef(), {
    title: d.Title,
    poster: d.Poster,
    genre: d.Genre,
    imdbID: d.imdbID,
    createdAt: Date.now(),
    watched: false,
    favorite: false,
    userRating: 0,
    folder: currentFolder === "All" ? "Archive" : currentFolder
  });

  showToast("Added to Archive ✅", "success");
  document.getElementById('movieOverlay').classList.add('hidden');
};

  async function loadTrendingMovies() {
  const res = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${tmdbApiKey}`);
  const data = await res.json();

  document.getElementById('trendingList').innerHTML = data.results.slice(0,10).map(m => `
    <div class="trending-card" onclick="showDetails('${m.title.replace(/'/g,"")}', '${m.id}')">
      <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
    </div>
  `).join('');
}

    // --- LISTENERS ---
  document.getElementById('unifiedSearchBtn').onclick = () => handleSearch('unifiedSearchInput', 'importResults');
  document.getElementById('unifiedSearchInput').oninput = () => handleSearch('unifiedSearchInput', 'importResults');
  document.getElementById('libQuickSearchBtn').onclick = () => handleSearch('libQuickSearchInput', 'libSearchResults');

  document.getElementById('authActionBtn').onclick = async () => {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value.trim();

  if (!email || !password) {
    showToast("Enter email & password", "error");
    return;
  }

  try {
    if (authMode === "signup") {
      await createUserWithEmailAndPassword(auth, email, password);
      showToast("Account created ✅", "success");
    } else {
      await signInWithEmailAndPassword(auth, email, password);
      showToast("Logged in ✅", "success");
    }
  } catch (err) {
    console.error(err);

    let msg = "Login failed";

    switch (err.code) {
      case "auth/invalid-email":
        msg = "Invalid email format";
        break;
      case "auth/user-not-found":
        msg = "No account found";
        break;
      case "auth/wrong-password":
        msg = "Wrong password";
        break;
      case "auth/email-already-in-use":
        msg = "Email already registered";
        break;
      case "auth/weak-password":
        msg = "Password should be at least 6 characters";
        break;
      case "auth/network-request-failed":
        msg = "Network error (check internet)";
        break;
      default:
        msg = err.message;
    }

    showToast(msg, "error");
  }
};
  document.getElementById('authGuestBtn').onclick = () => signInAnonymously(auth);
  document.getElementById('authSwitchLink').onclick = () => {
  authMode = authMode === "signup" ? "login" : "signup";

  document.getElementById('authActionBtn').textContent =
    authMode === "signup" ? "Create Account" : "Log In";

  document.getElementById('authSwitchText').textContent =
    authMode === "signup"
      ? "Already have an account?"
      : "Don't have an account?";

  document.getElementById('authSwitchLink').textContent =
    authMode === "signup" ? "Log in" : "Sign up";
};
  document.getElementById('logoutBtn').onclick = () => signOut(auth);
  document.getElementById('search').oninput = renderMovies;
  document.getElementById('watchFilter').onchange = renderMovies;
  document.getElementById('genreFilter').onchange = renderMovies;
  document.getElementById('sortSelect').onchange = renderMovies;
  document.getElementById('createFolderBtn').onclick = async () => {
    const n = prompt("Folder Name:");
    if(n?.trim()) await setDoc(doc(db, "users", currentUser.uid, "folders", n.trim()), { name: n.trim() });
  };
  window.toggleWatched = (id, v) => updateDoc(movieDoc(id), { watched: !v });
  window.toggleFavorite = (id, v) => updateDoc(movieDoc(id), { favorite: !v });
  window.deleteMovie = (id) => confirm("Remove?") && deleteDoc(movieDoc(id));
  window.moveMovie = (id, folder) => updateDoc(movieDoc(id), { folder });
  window.addEventListener('DOMContentLoaded', triggerRefresh);

</script>
</body>
</html>
